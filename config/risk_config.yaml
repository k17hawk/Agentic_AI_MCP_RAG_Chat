# risk_config.yaml
# Configuration for risk management layer

# General risk settings
general:
  enabled: true
  initial_capital: 100000
  max_portfolio_risk: 0.25  # 25% max portfolio risk
  risk_free_rate: 0.02  # 2% annual

# Position sizing
position_sizing:
  enabled: true
  default_method: "volatility_adjusted"  # kelly, half_kelly, fixed, volatility_adjusted
  
  # Kelly Criterion
  kelly:
    default_win_rate: 0.55
    default_avg_win: 0.10  # 10%
    default_avg_loss: 0.05  # 5%
    max_fraction: 0.25
    min_fraction: 0.01
  
  # Half Kelly
  half_kelly:
    kelly_multiplier: 0.5
    max_fraction: 0.15
    min_fraction: 0.005
  
  # Fixed Fraction
  fixed_fraction:
    default_fraction: 0.02  # 2%
    max_fraction: 0.10
    min_fraction: 0.005
    scale_with_confidence: true
    confidence_scale_factor: 0.5
  
  # Volatility Adjusted
  volatility_adjusted:
    base_fraction: 0.02
    target_volatility: 0.20  # 20% annualized
    max_scale: 2.0
    min_scale: 0.25

# Stop Loss Configuration
stop_loss:
  enabled: true
  
  # ATR-based stops
  atr_stop:
    default_multiplier: 2.0
    min_multiplier: 1.0
    max_multiplier: 4.0
    atr_period: 14
  
  # Volatility-based stops
  volatility_stop:
    default_multiplier: 2.0
    lookback_period: 20
    min_multiplier: 1.0
    max_multiplier: 4.0
  
  # Trailing stops
  trailing_stop:
    default_trail_percent: 5.0
    atr_multiplier: 2.0
    activation_percent: 10.0
  
  # Time stops
  time_stop:
    default_max_hold_hours: 24
    short_term_hours: 4
    swing_hours: 72
    position_hours: 168

# Portfolio Risk
portfolio_risk:
  enabled: true
  
  # VaR settings
  var:
    confidence_level: 0.95
    time_horizon: 1
    historical_periods: 252
    method: "historical"  # historical, parametric, monte_carlo
  
  # Expected Shortfall (CVaR)
  expected_shortfall:
    confidence_level: 0.95
    historical_periods: 252
  
  # Correlation
  correlation:
    lookback_period: 60
    min_history: 30
    high_correlation_threshold: 0.8
  
  # Diversification
  diversification:
    ideal_num_assets: 20
    max_sector_exposure: 0.30
    weights:
      num_assets: 0.3
      correlation: 0.3
      sector_concentration: 0.2
      position_concentration: 0.2
  
  # Stress testing
  stress_test:
    scenarios:
      market_crash_2008: -0.37
      flash_crash_2010: -0.09
      covid_crash_2020: -0.34
      interest_rate_shock: -0.15
      volatility_spike: -0.10

# Market Regime Risk
market_regime_risk:
  enabled: true
  
  # Risk multipliers by regime
  risk_multipliers:
    strong_bull_trending: 1.2
    bull_trending: 1.1
    bull_ranging: 1.0
    neutral_ranging: 1.0
    bear_ranging: 0.9
    bear_trending: 0.8
    strong_bear_trending: 0.7
    high_volatility: 0.6
    extreme_volatility_ranging: 0.5
    transition: 0.7
    panic: 0.4
  
  # Stop multipliers by regime
  stop_multipliers:
    strong_bull_trending: 2.5
    bull_trending: 2.0
    bull_ranging: 1.8
    neutral_ranging: 1.5
    bear_ranging: 1.3
    bear_trending: 1.2
    strong_bear_trending: 1.0
    high_volatility: 1.5
    extreme_volatility_ranging: 1.8
    transition: 1.2
    panic: 1.0
  
  # Max position sizes by regime
  max_position_sizes:
    strong_bull_trending: 0.25
    bull_trending: 0.20
    bull_ranging: 0.15
    neutral_ranging: 0.12
    bear_ranging: 0.10
    bear_trending: 0.08
    strong_bear_trending: 0.05
    high_volatility: 0.06
    extreme_volatility_ranging: 0.04
    transition: 0.07
    panic: 0.03

# Risk thresholds
thresholds:
  max_daily_loss: 0.05  # 5%
  max_drawdown: 0.20  # 20%
  min_sharpe: 0.5
  min_win_rate: 0.4
  consecutive_losses: 5
  volatility_spike: 2.0
  profit_factor_min: 1.0
  max_position_concentration: 0.25
  min_trading_volume: 100000

# Risk scoring
risk_scoring:
  weights:
    position_size: 0.25
    stop_distance: 0.20
    volatility: 0.20
    market_regime: 0.15
    liquidity: 0.10
    correlation: 0.10
  
  thresholds:
    low: 0.3
    high: 0.7

# Queue settings
queue:
  max_size: 500
  item_ttl_seconds: 300