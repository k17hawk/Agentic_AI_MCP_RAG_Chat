# ============================================
# TRIGGER GROUPS (Composite Triggers)
# ============================================

trigger_groups:
  - name: "high_probability_setup"
    description: "Multiple triggers confirming same opportunity"
    required_triggers:
      - "major_price_movement"
      - "unusual_volume_spike"
      - "breaking_news"
    min_confirmations: 2
    priority_boost: "CRITICAL"
    cooldown_minutes: 60
  
  - name: "momentum_surge"
    description: "Price + volume + social momentum"
    required_triggers:
      - "rapid_intraday_movement"
      - "unusual_volume_spike"
      - "social_media_sentiment"
    min_confirmations: 2
    priority_boost: "HIGH"
    cooldown_minutes: 30
  
  - name: "reversal_setup"
    description: "Potential trend reversal signals"
    required_triggers:
      - "volume_climax"
      - "candlestick_patterns"
      - "rsi_extreme"
    min_confirmations: 2
    priority_boost: "HIGH"
    cooldown_minutes: 120

# ============================================
# ALERT ROUTING RULES
# ============================================

alert_routing:
  CRITICAL:
    channels: ["whatsapp", "sms", "email"]
    require_human_approval: true
    timeout_minutes: 5
    auto_reject_on_timeout: true
    
  HIGH:
    channels: ["whatsapp", "email"]
    require_human_approval: false
    log_only: false
    
  MEDIUM:
    channels: ["email"]
    require_human_approval: false
    log_only: false
    
  LOW:
    channels: ["log_only"]
    require_human_approval: false
    log_only: true

# ============================================
# PERFORMANCE & OPTIMIZATION
# ============================================

performance:
  max_triggers_per_cycle: 20
  batch_processing: true
  batch_size: 5
  parallel_execution: true
  max_workers: 4
  cache_results: true
  cache_ttl_seconds: 30