alert_routing:
  CRITICAL:
    auto_reject_on_timeout: true
    channels:
    - whatsapp
    - email
    require_human_approval: false
    timeout_minutes: 1
  HIGH:
    channels:
    - email
    - whatsapp
    log_only: false
    require_human_approval: false
  LOW:
    channels:
    - log_only
    require_human_approval: false
  MEDIUM:
    channels:
    - email
    - whatsapp
    require_human_approval: false
global:
  cooldown_seconds: 60
  default_priority: MEDIUM
  enabled: true
  max_concurrent_triggers: 10
  retry_attempts: 3
  retry_delay_seconds: 5
performance:
  batch_processing: true
  batch_size: 5
  cache_results: true
  cache_ttl_seconds: 30
  max_triggers_per_cycle: 20
  max_workers: 4
  parallel_execution: true
trigger_groups:
- cooldown_minutes: 1
  description: Multiple triggers confirming same opportunity
  min_confirmations: 1
  name: high_probability_setup
  priority_boost: CRITICAL
  required_triggers:
  - major_price_movement
  - unusual_volume_spike
triggers:
- config:
    cooldown_minutes: 1
    execution_mode: realtime
    min_volume: 100000
    percent_change: 0.5
    symbols:
    - NVDA
    - AMD
    - META
    - AAPL
    - MSFT
    - GOOGL
    thresholds:
      absolute: 0.5
      momentum: 0.5
      relative: 0.8
    timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
    volatility_adjustment: true
  description: Detects significant price movements
  enabled: true
  name: major_price_movement
  priority: CRITICAL
  type: price_alert
- config:
    cooldown_minutes: 1
    execution_mode: realtime
    min_volume: 100000
    percent_change: 0.3
    symbols:
    - AAPL
    - MSFT
    - NVDA
    - TSLA
    - AMD
    - META
    - GOOGL
    thresholds:
      absolute: 0.3
      relative: 1.5
    timeframes:
    - 1m
    - 5m
    volatility_adjustment: true
  description: Catches fast intraday price spikes
  enabled: true
  name: rapid_intraday_movement
  priority: HIGH
  type: price_alert
- config:
    breakout_threshold: 0.5
    confirmation_required: false
    execution_mode: realtime
    lookback_periods: 20
    min_volume_multiplier: 1.0
    percent_change: 0.5
    symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - NVDA
    timeframes:
    - 1h
    - 4h
    volume_spike_required: false
  description: Identifies breakouts
  enabled: true
  name: breakout_detector
  priority: HIGH
  type: price_alert
- config:
    cooldown_minutes: 1
    execution_mode: realtime
    lookback_days: 5
    min_absolute_volume: 50000
    symbols:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - TSLA
    - META
    - AMD
    timeframe: 15m
    volume_multiplier: 1.5
  description: Detects abnormal trading volume
  enabled: true
  name: unusual_volume_spike
  priority: HIGH
  type: volume_spike
- config:
    cooldown_minutes: 1
    execution_mode: realtime
    lookback_days: 5
    min_absolute_volume: 100000
    symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - NVDA
    timeframe: 1h
    volume_multiplier: 1.5
  description: Identifies volume climaxes
  enabled: true
  name: volume_climax
  priority: MEDIUM
  type: volume_spike
- config:
    action: premarket_analysis
    cron: 30 9 * * 1-5
    execution_mode: scheduled
    symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - GOOGL
    - NVDA
    - TSLA
    - META
    timezone: America/New_York
  description: Market open trigger
  enabled: true
  name: market_open
  priority: HIGH
  type: scheduled
- config:
    action: end_of_day_analysis
    cron: 0 16 * * 1-5
    execution_mode: scheduled
    symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - GOOGL
    - NVDA
    - TSLA
    - META
    timezone: America/New_York
  description: Market close trigger
  enabled: true
  name: market_close
  priority: HIGH
  type: scheduled
- config:
    action: hourly_scan
    cron: 0 * * * 1-5
    execution_mode: scheduled
    symbols:
    - SPY
    - QQQ
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    timezone: America/New_York
  description: Hourly market check
  enabled: true
  name: hourly_check
  priority: MEDIUM
  type: scheduled
- config:
    action: daily_summary
    cron: 30 16 * * 1-5
    execution_mode: scheduled
    symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - TSLA
    - META
    timezone: America/New_York
  description: Daily analysis
  enabled: true
  name: daily_analysis
  priority: LOW
  type: scheduled
- config:
    action: weekly_opportunity_scan
    cron: 0 17 * * 5
    execution_mode: scheduled
    symbols:
    - SPY
    - QQQ
    - IWM
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - TSLA
    - META
    - AMD
    - NFLX
    timezone: America/New_York
  description: Weekly scan
  enabled: true
  name: weekly_scan
  priority: LOW
  type: scheduled
